<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Textarea with Line Numbers and Full Scroll</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .textarea-wrapper {
      display: flex;
      font-family: monospace;
      border: 1px solid #ccc;
      border-radius: 4px;
      height: 300px;
      overflow: hidden;
    }

    .line-numbers {
      background-color: #f8f9fa;
      color: #6c757d;
      padding: 0.5rem 0.75rem;
      text-align: right;
      user-select: none;
      white-space: pre;
      overflow: hidden;
    }

    .code-textarea {
      border: none;
      resize: none;
      outline: none;
      flex: 1;
      padding: 0.5rem 0.75rem;
      font-family: monospace;
      line-height: 1.5rem;
      overflow: scroll; /* Enable both vertical and horizontal scroll */
      white-space: pre;  /* Prevent line wrapping */
    }

    .line-numbers,
    .code-textarea {
      line-height: 1.5rem;
    }
  </style>
</head>
<body class="p-4">

  <div class="container">
    <h4>Textarea with Line Numbers and Scroll</h4>
    <div class="textarea-wrapper">
      <div id="lineNumbers" class="line-numbers">
        1
      </div>
      <textarea 
        id="codeInput" 
        class="code-textarea" 
        rows="999"
        spellcheck="false"
        hx-post="/save" 
        hx-trigger="input changed delay:500ms" 
        hx-swap="none"
      ></textarea>
    </div>
  </div>

  <!-- HTMX (optional) -->
  <script src="https://unpkg.com/htmx.org@1.9.2"></script>

  <script>
    const textarea = document.getElementById('codeInput');
    const lineNumbers = document.getElementById('lineNumbers');

    function updateLineNumbers() {
      const lines = textarea.value.split('\n').length;
      lineNumbers.textContent = Array.from({ length: lines }, (_, i) => i + 1).join('\n');
    }

    textarea.addEventListener('input', updateLineNumbers);
    textarea.addEventListener('scroll', () => {
      lineNumbers.scrollTop = textarea.scrollTop;
    });

    updateLineNumbers(); // Initial line numbers
  </script>

</body>
</html>
