<div class="card mb-2">
    <div class="card-body">
        <p><strong>You:</strong> {{ message }}</p>
        <p><strong>Bot:</strong> {{ reply }}</p>
        {% if audio_url %}
        <audio class="w-100" controls autoplay>
            <source src="{{ audio_url }}" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
        {% else %}
        <div class="alert alert-warning mb-0 py-2" role="alert">
            {{ audio_error or "Audio tidak tersedia untuk respons ini." }}
        </div>
        {% endif %}
    </div>
</div>
