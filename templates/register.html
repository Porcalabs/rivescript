<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Rivescript Learning Lab</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/static/bootstrap-icons/bootstrap-icons.css" />
    <link rel="stylesheet" href="/static/css/custom.css" />
  </head>
  <body class="auth-body">
    <main class="auth-shell">
      <section class="auth-card auth-card-wide">
        <div class="auth-brand">
          <div class="brand-icon">
            <i class="bi bi-person-plus"></i>
          </div>
          <div>
            <h1 class="auth-title">Registrasi Mahasiswa</h1>
            <p class="auth-subtitle">Buat akun untuk menyimpan progress per universitas.</p>
          </div>
        </div>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form action="/register" method="post" class="auth-form" id="register-form">
          <label class="auth-label" for="full_name">Nama Lengkap</label>
          <input
            id="full_name"
            name="full_name"
            type="text"
            class="form-control auth-input"
            value="{{ form_data.full_name if form_data else '' }}"
            required
          />

          <label class="auth-label mt-3" for="nim">NIM</label>
          <input
            id="nim"
            name="nim"
            type="text"
            class="form-control auth-input"
            value="{{ form_data.nim if form_data else '' }}"
            required
          />

          <label class="auth-label mt-3" for="university_id">Universitas</label>
          <select id="university_id" name="university_id" class="form-select auth-input" required>
            <option value="">Pilih universitas</option>
            {% for university in universities %}
            <option
              value="{{ university.university_id }}"
              {% if form_data.university_id == university.university_id %}selected{% endif %}
            >
              {{ university.university_name }}
            </option>
            {% endfor %}
          </select>

          <div id="other-university-wrap" class="mt-3">
            <label class="auth-label" for="university_other_name">Nama Universitas Lain</label>
            <input
              id="university_other_name"
              name="university_other_name"
              type="text"
              class="form-control auth-input"
              value="{{ form_data.university_other_name if form_data else '' }}"
            />
          </div>

          <label class="auth-label mt-3" for="registration_code">Kode Universitas</label>
          <input
            id="registration_code"
            name="registration_code"
            type="text"
            class="form-control auth-input"
            required
          />

          <label class="auth-label mt-3" for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            class="form-control auth-input"
            required
          />

          <button type="submit" class="btn btn-primary auth-submit mt-4">Daftar</button>
        </form>

        <p class="auth-switch">
          Sudah punya akun?
          <a href="/login">Login di sini</a>
        </p>
      </section>
    </main>

    <script>
      const universitySelect = document.getElementById("university_id");
      const otherUniversityWrap = document.getElementById("other-university-wrap");
      const otherUniversityInput = document.getElementById("university_other_name");

      function toggleOtherUniversityInput() {
        const isOther = ["OTHER", "OTH"].includes(universitySelect.value);
        otherUniversityWrap.style.display = isOther ? "block" : "none";
        otherUniversityInput.required = isOther;
      }

      universitySelect.addEventListener("change", toggleOtherUniversityInput);
      toggleOtherUniversityInput();
    </script>
  </body>
</html>
