<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rivescript ChatBot Web App</title>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/static/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/static/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/static/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="/static/favicon/site.webmanifest" />

    <link href="/static/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/static/bootstrap-icons/bootstrap-icons.css" />
    <link rel="stylesheet" href="/static/css/custom.css" />
    <script src="/static/js/htmx.min.js"></script>
  </head>
  <body>
    <div class="container mt-3">
      <h1 class="mb-4 text-center font-monospace">
        Rivescript ChatBot Web App <i class="bi bi-robot"></i>
      </h1>

      <div class="row gx-3 gy-3">
        <div class="col-xl-4">{% include "sidebar.html" %}</div>
        <div class="col">
          <form
            id="rivescript-form"
            hx-post="/set-rivescript"
            hx-target="this"
            hx-swap="none"
          >
            <div class="input-group">
              <div class="textarea-wrapper form-control">
                <div id="lineNumbers" class="line-numbers">1</div>
                <textarea
                  id="rivescript"
                  name="rivescript"
                  class="code-textarea"
                  style="resize: none"
                  rows="15"
                  disabled
                >
{{ rivescript_text }}</textarea
                >
              </div>
              <button
                id="edit-save-btn"
                class="btn btn-warning"
                type="button"
                onclick="toggleEditMode()"
              >
                Edit
              </button>
            </div>
          </form>
          <div
            id="chat-box"
            class="overflow-auto border p-3 mt-3 bg-body-tertiary rounded"
            style="height: 320px"
          ></div>
          <form
            id="chat-form"
            hx-post="/chat"
            hx-target="#chat-box"
            hx-swap="afterbegin"
            class="mt-3"
          >
            <div class="input-group">
              <input
                type="text"
                id="message"
                name="message"
                class="form-control"
                placeholder="Type your message..."
                required
              />
              <button id="send-btn" class="btn btn-primary" type="submit">
                Send
              </button>
              <button
                id="mic-btn"
                class="btn btn-secondary"
                type="button"
                onclick="startListening()"
              >
                🎙️
              </button>
            </div>
          </form>
          <div class="text-center my-3">
            <div class="fw-medium">
              <i class="bi bi-c-circle"></i> 2025
              <div class="vr"></div>
              Rhayeksa D. S.
              <div class="vr"></div>
              (^_^)
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal -->
    <div
      class="modal fade"
      id="infoModal"
      tabindex="-1"
      aria-labelledby="infoModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="infoModalLabel">Warning</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Tutup"
            ></button>
          </div>
          <div class="modal-body" id="modalMessage">
            <!-- Pesan akan diisi lewat JavaScript -->
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Tutup
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Validasi RiveScript -->
    <div
      class="modal fade"
      id="rivescriptErrorModal"
      tabindex="-1"
      aria-labelledby="rivescriptErrorModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content border-danger">
          <div class="modal-header bg-danger text-white">
            <h5 class="modal-title" id="rivescriptErrorModalLabel">
              RiveScript Error
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body" id="rivescriptErrorMessage"></div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-danger"
              data-bs-dismiss="modal"
            >
              Tutup
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/modal.inet.not.connect.js"></script>
    <script src="/static/js/rivescript.toogle.button.js"></script>
    <script src="/static/js/submit.js"></script>
    <script src="/static/js/recognition.js"></script>
    <script src="/static/js/custom.js"></script>
  </body>
</html>
